name: Build, Sign and Release GoByTel Agent

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────
      - name: Checkout repositorio
        uses: actions/checkout@v4

      # ── 2. Node.js 20 (Electron 33+ lo requiere) ──────────────────────
      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # ── 3. Instalar dependencias ───────────────────────────────────────
      - name: Instalar dependencias
        run: npm ci

      # ── 4. Extraer versión del tag ─────────────────────────────────────
      - name: Extraer version
        id: version
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      # ── 5. Actualizar versión en package.json y constants.js ───────────
      - name: Actualizar version
        shell: powershell
        run: |
          npm version ${{ steps.version.outputs.VERSION }} --no-git-tag-version
          $content = Get-Content src/shared/constants.js -Raw
          $content = $content -replace "const VERSION\s*=.*", "const VERSION     = '${{ steps.version.outputs.VERSION }}';"
          $content | Set-Content src/shared/constants.js

      # ── 6. Build + Sign + Package con electron-builder ─────────────────
      - name: Build Electron app
        env:
          CSC_LINK: ${{ secrets.CODESIGN_PFX_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.CODESIGN_PFX_PASSWORD }}
        run: npx electron-builder --win --publish never
        shell: powershell

      # ── 7. Generar alias latest ────────────────────────────────────────
      - name: Generar alias GoByTel-Agent-Setup-latest.exe
        shell: powershell
        run: |
          $installer = Get-ChildItem -Path "dist" -Filter "GoByTel-Agent-Setup-v*.exe" |
                         Select-Object -First 1 -ExpandProperty FullName
          if ($installer) {
            Copy-Item $installer "dist\GoByTel-Agent-Setup-latest.exe"
            Write-Host "Alias creado: GoByTel-Agent-Setup-latest.exe"
          }

      # ── 7.5 Crear GitHub Release con archivos compilados ──────────────────
      - name: Crear GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: "GoByTel Agent v${{ steps.version.outputs.VERSION }}"
          body: |
            # GoByTel Agent v${{ steps.version.outputs.VERSION }}

            Descarga el instalador para instalar GoByTel Agent en tu PC.
          files: |
            dist/GoByTel-Agent-Setup-v${{ steps.version.outputs.VERSION }}.exe
            dist/GoByTel-Agent-Setup-latest.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


      # ── 8. Setup SSH para deploy ────────────────────────────────────────────
      - name: Setup SSH key
        shell: bash
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 173.249.10.36 >> ~/.ssh/known_hosts 2>/dev/null

      # ── 9. Deploy instaladores con SCP ──────────────────────────────────────
      - name: Deploy instaladores al servidor
        shell: bash
        run: |
          scp -i ~/.ssh/id_ed25519 \
            dist/GoByTel-Agent-Setup-v${{ steps.version.outputs.VERSION }}.exe \
            dist/GoByTel-Agent-Setup-latest.exe \
            devfrank@173.249.10.36:/home/gobytel/htdocs/gobytel.com/uploads/downloads/

          echo "✅ Deploy completado"

      # ── 10. Cleanup versiones antiguas ──────────────────────────────────────
      - name: Cleanup old versions
        shell: bash
        continue-on-error: true
        run: |
          ssh -i ~/.ssh/id_ed25519 devfrank@173.249.10.36 \
            "cd /home/gobytel/htdocs/gobytel.com/uploads/downloads/ && \
             ls -t GoByTel-Agent-Setup-v*.exe 2>/dev/null | tail -n +4 | xargs -r rm -v"
