name: Build, Sign and Release GoByTel Agent

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────
      - name: Checkout repositorio
        uses: actions/checkout@v4

      # ── 2. Node.js 20 (Electron 33+ lo requiere) ──────────────────────
      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Instalar dependencias ───────────────────────────────────────
      - name: Instalar dependencias
        run: npm ci

      # ── 4. Extraer versión del tag ─────────────────────────────────────
      - name: Extraer version
        id: version
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      # ── 5. Actualizar versión en package.json y constants.js ───────────
      - name: Actualizar version
        shell: bash
        run: |
          npm version ${{ steps.version.outputs.VERSION }} --no-git-tag-version
          sed -i "s/const VERSION.*=.*/const VERSION     = '${{ steps.version.outputs.VERSION }}';/" src/shared/constants.js

      # ── 6. Build + Sign + Package con electron-builder ─────────────────
      - name: Build Electron app
        env:
          CSC_LINK: ${{ secrets.CODESIGN_PFX_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.CODESIGN_PFX_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish always
        shell: powershell

      # ── 7. Generar alias latest ────────────────────────────────────────
      - name: Generar alias GoByTel-Agent-Setup-latest.exe
        shell: powershell
        run: |
          $installer = Get-ChildItem -Path "dist" -Filter "GoByTel-Agent-Setup-v*.exe" |
                         Select-Object -First 1 -ExpandProperty FullName
          if ($installer) {
            Copy-Item $installer "dist\GoByTel-Agent-Setup-latest.exe"
            Write-Host "Alias creado: GoByTel-Agent-Setup-latest.exe"
          }

      # ── 8. Deploy al servidor GoByTel ──────────────────────────────────
      - name: Subir installer al servidor GoByTel
        uses: appleboy/scp-action@v0.1.7
        continue-on-error: true
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          source: "dist/GoByTel-Agent-Setup-v${{ steps.version.outputs.VERSION }}.exe,dist/GoByTel-Agent-Setup-latest.exe"
          target: "/home/gobytel/htdocs/gobytel.com/uploads/downloads/"
          strip_components: 1
