name: Build, Sign and Release GoByTel Agent

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────
      - name: Checkout repositorio
        uses: actions/checkout@v4

      # ── 2. Node.js 20 (Electron 33+ lo requiere) ──────────────────────
      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # ── 3. Instalar dependencias ───────────────────────────────────────
      - name: Instalar dependencias
        run: npm ci

      # ── 4. Extraer versión del tag ─────────────────────────────────────
      - name: Extraer version
        id: version
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      # ── 5. Actualizar versión en package.json y constants.js ───────────
      - name: Actualizar version
        shell: powershell
        run: |
          npm version ${{ steps.version.outputs.VERSION }} --no-git-tag-version
          $content = Get-Content src/shared/constants.js -Raw
          $content = $content -replace "const VERSION\s*=.*", "const VERSION     = '${{ steps.version.outputs.VERSION }}';"
          $content | Set-Content src/shared/constants.js

      # ── 6. Build + Sign + Package con electron-builder ─────────────────
      - name: Build Electron app
        env:
          CSC_LINK: ${{ secrets.CODESIGN_PFX_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.CODESIGN_PFX_PASSWORD }}
        run: npx electron-builder --win
        shell: powershell

      # ── 7. Generar alias latest ────────────────────────────────────────
      - name: Generar alias GoByTel-Agent-Setup-latest.exe
        shell: powershell
        run: |
          $installer = Get-ChildItem -Path "dist" -Filter "GoByTel-Agent-Setup-v*.exe" |
                         Select-Object -First 1 -ExpandProperty FullName
          if ($installer) {
            Copy-Item $installer "dist\GoByTel-Agent-Setup-latest.exe"
            Write-Host "Alias creado: GoByTel-Agent-Setup-latest.exe"
          }

      # ── 7.5 Crear GitHub Release con archivos compilados ──────────────────
      - name: Crear GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: "GoByTel Agent v${{ steps.version.outputs.VERSION }}"
          body: |
            # GoByTel Agent v${{ steps.version.outputs.VERSION }}

            Descarga el instalador para instalar GoByTel Agent en tu PC.
          files: |
            dist/GoByTel-Agent-Setup-v${{ steps.version.outputs.VERSION }}.exe
            dist/GoByTel-Agent-Setup-latest.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 8. Deploy al servidor GoByTel (ssh-action funciona en Windows) ──────
      - name: Subir installer al servidor GoByTel
        uses: appleboy/ssh-action@master
        continue-on-error: true
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          script: |
            mkdir -p /home/gobytel/htdocs/gobytel.com/uploads/downloads/
            cd /home/gobytel/htdocs/gobytel.com/uploads/downloads/
            # Cleanup old versions (keep last 3)
            ls -t GoByTel-Agent-Setup-v*.exe 2>/dev/null | tail -n +4 | xargs -r rm

      # ── 9. Enviar instaladores con rsync ───────────────────────────────────
      - name: Enviar instaladores con rsync
        shell: bash
        env:
          DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
        continue-on-error: true
        run: |
          which sshpass > /dev/null || choco install sshpass -y
          sshpass -p "$DEPLOY_PASSWORD" rsync -avz --delete-after \
            "dist/GoByTel-Agent-Setup-v${{ steps.version.outputs.VERSION }}.exe" \
            "dist/GoByTel-Agent-Setup-latest.exe" \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/home/gobytel/htdocs/gobytel.com/uploads/downloads/" \
            || echo "Note: rsync upload may have failed but workflow continues"
