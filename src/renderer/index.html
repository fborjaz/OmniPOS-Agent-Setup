<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline';">
  <title>GoByTel Agent</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <img src="../../build/icon.ico" alt="GoByTel" class="logo" width="32" height="32">
      <div class="header-text">
        <h1>GoByTel Agent</h1>
        <span class="version" id="version">v1.0.0</span>
      </div>
    </div>

    <!-- Puerto COM (Configuración) -->
    <div class="section compact">
      <div class="field-inline">
        <label>Puerto COM</label>
        <div class="field-row">
          <select id="com-port">
            <option value="">Detectando...</option>
          </select>
          <button id="btn-refresh-ports" class="btn-icon" title="Recargar puertos">↻</button>
        </div>
      </div>
    </div>

    <!-- Gaveta - Sección Principal -->
    <div class="section main-section">
      <div class="drawer-status-card">
        <div class="status-indicator">
          <span class="status-dot" id="drawer-dot"></span>
          <div class="status-text">
            <span class="status-label">Gaveta</span>
            <span id="drawer-status" class="status-value">Desconectada</span>
          </div>
        </div>
      </div>

      <button id="btn-test-drawer" class="btn btn-primary btn-large">
        🔓 Abrir Gaveta
      </button>
      <span id="test-result" class="test-result"></span>
    </div>

    <!-- Datos de Venta -->
    <div class="section sale-info">
      <div class="sale-field">
        <label>Total Venta</label>
        <input type="number" id="sale-total" placeholder="$0.00" readonly class="value-display">
      </div>
      <div class="sale-field">
        <label>Dinero Recibido</label>
        <input type="number" id="paid-amount" placeholder="$0.00" readonly class="value-display">
      </div>
      <div class="sale-field">
        <label>Cambio</label>
        <input type="number" id="change-amount" placeholder="$0.00" readonly class="value-display highlight">
      </div>
    </div>

    <hr class="divider">

    <!-- Versión y Estado -->
    <div class="section compact">
      <div class="field-inline">
        <span class="label-text">v<span id="current-version">1.0.0</span></span>
        <span id="update-status" class="status-small">Al día</span>
      </div>
    </div>

    <!-- Opciones -->
    <div class="section compact">
      <label class="checkbox-row">
        <input type="checkbox" id="auto-start" checked>
        <span>Iniciar con Windows</span>
      </label>
    </div>

    <!-- Footer -->
    <div class="footer">
      <span>© 2026 <a href="https://github.com/fborjaz" target="_blank">Frank Borja</a></span>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
