appId: com.gobytel.agent
productName: GoByTel Agent

directories:
  output: dist
  buildResources: build

files:
  - src/**/*
  - build/icon.ico

win:
  target: nsis
  icon: build/icon.ico
  signingHashAlgorithms:
    - sha256

nsis:
  oneClick: true
  perMachine: true
  allowToChangeInstallationDirectory: false
  include: build/installer.nsh
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  deleteAppDataOnUninstall: false
  artifactName: "GoByTel-Agent-Setup-v${version}.${ext}"
  shortcutName: GoByTel Agent

publish:
  provider: github
  owner: fborjaz
  repo: OmniPOS-Agent-Setup
