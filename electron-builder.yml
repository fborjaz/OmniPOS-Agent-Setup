appId: com.gobytel.agent
productName: GoByTel Agent
copyright: © 2026 Frank Borja (https://github.com/fborjaz)

directories:
  output: dist
  buildResources: build

files:
  - src/**/*
  - build/icon.ico

win:
  target: nsis
  icon: build/icon.ico
  certificateFile: null
  certificatePassword: null
  signingHashAlgorithms:
    - sha256

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: false
  perMachine: true
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeader: null
  artifactName: "GoByTel-Agent-Setup-v${version}.${ext}"
  shortcutName: GoByTel Agent
  createDesktopShortcut: true
  createStartMenuShortcut: true
  include: build/installer.nsh

publish:
  provider: github
  owner: fborjaz
  repo: OmniPOS-Agent-Setup
  releaseType: release
